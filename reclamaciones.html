<form action="https://formsubmit.co/griden.energia@gmail.com" method="POST">
  <label>Nombre completo</label>
  <input type="text" name="nombre" required>

  <label>Correo electrónico</label>
  <input type="email" name="correo" required>

  <label>Tipo</label>
  <select name="tipo" required>
    <option value="">Seleccione una opción</option>
    <option value="Queja">Queja</option>
    <option value="Reclamo">Reclamo</option>
    <option value="Sugerencia">Sugerencia</option>
  </select>

  <label>Detalle</label>
  <textarea name="mensaje" rows="6" required></textarea>

  <input type="hidden" name="_subject" value="Nuevo registro - Libro de reclamaciones Griden">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_next" value="https://gridenbolivia.com/gracias.html">

  <button type="submit">Enviar</button>
</form>
